<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/N9aLJ9va6/";

let model, webcam, labelContainer, maxPredictions;

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;

    webcam = new tmImage.Webcam(350, 350, flip);

    await webcam.setup();
    await webcam.play();

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    for (let i = 0; i < maxPredictions; i++) {

        const predictionDiv = document.createElement("div");
        predictionDiv.classList.add("prediction-box");

        predictionDiv.innerHTML = `
            <div class="label-title">
                <span id="label-${i}">Classe</span>
                <span id="value-${i}">0%</span>
            </div>

            <div class="progress">
                <div
                    id="bar-${i}"
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    role="progressbar"
                    style="width: 0%">
                </div>
            </div>
        `;

        labelContainer.appendChild(predictionDiv);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {

        const probability = (prediction[i].probability * 100).toFixed(1);

        document.getElementById(`label-${i}`).innerText = prediction[i].className;

        document.getElementById(`value-${i}`).innerText = `${probability}%`;

        const progressBar = document.getElementById(`bar-${i}`);

        progressBar.style.width = `${probability}%`;

        progressBar.innerText = `${probability}%`;
    }
}

</script>

</body>
</html>
