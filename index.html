<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconhecimento de Gestos com IA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }

        .main-card {
            background: rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
        }

        #webcam-container canvas {
            border-radius: 20px;
            width: 100% !important;
            max-width: 400px;
            border: 4px solid white;
        }

        .btn-camera {
            background: #2563eb;
            border: none;
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
        }

        .prediction-box {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
        }

        .label-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .progress {
            height: 25px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="main-card text-center">

                <h1 class="mb-3">🤖 Reconhecimento de Gestos com IA</h1>

                <p class="mb-4">
                    Projeto utilizando Teachable Machine + TensorFlow.js
                </p>

                <button class="btn-camera mb-4" onclick="init()">
                    📷 Permitir Câmera
                </button>

                <div id="webcam-container" class="mb-4"></div>

                <div id="label-container"></div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/N9aLJ9va6/";

let model, webcam, labelContainer, maxPredictions;

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;

    webcam = new tmImage.Webcam(350, 350, flip);

    await webcam.setup();
    await webcam.play();

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    for (let i = 0; i < maxPredictions; i++) {

        const predictionDiv = document.createElement("div");
        predictionDiv.classList.add("prediction-box");

        predictionDiv.innerHTML = `
            <div class="label-title">
                <span id="label-${i}">Classe</span>
                <span id="value-${i}">0%</span>
            </div>

            <div class="progress">
                <div
                    id="bar-${i}"
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    role="progressbar"
                    style="width: 0%">
                </div>
            </div>
        `;

        labelContainer.appendChild(predictionDiv);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {

        const probability = (prediction[i].probability * 100).toFixed(1);

        document.getElementById(`label-${i}`).innerText = prediction[i].className;

        document.getElementById(`value-${i}`).innerText = `${probability}%`;

        const progressBar = document.getElementById(`bar-${i}`);

        progressBar.style.width = `${probability}%`;

        progressBar.innerText = `${probability}%`;
    }
}

</script>

</body>
</html>
